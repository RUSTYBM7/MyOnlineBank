name: OrbitPay iOS CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  RUBY_VERSION: '3.2.2'
  XCODE_VERSION: '15.2'

jobs:
  # ─── Lint & Type Check ──────────────────────────────────
  lint:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present

  # ─── Unit Tests ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Run Jest tests
        run: npm test --if-present -- --ci --coverage --watchAll=false

  # ─── Build Debug IPA ────────────────────────────────────
  build-debug:
    name: Build Debug IPA
    runs-on: macos-14
    needs: [lint]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Build (no code signing)
        run: |
          cd ios && xcodebuild \
            -workspace OrbitPay.xcworkspace \
            -scheme OrbitPay \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            clean build \
            | xcpretty

  # ─── Build & Upload to TestFlight ───────────────────────
  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-14
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    environment: testflight
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Deploy to TestFlight
        run: fastlane beta
        env:
          APPLE_ID:                          ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:                     ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID:                       ${{ secrets.ITC_TEAM_ID }}
          MATCH_GIT_URL:                     ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:                    ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          SLACK_URL:                         ${{ secrets.SLACK_URL }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OrbitPay-${{ github.sha }}.ipa
          path: build/OrbitPay.ipa
          retention-days: 30

  # ─── App Store Release ──────────────────────────────────
  deploy-appstore:
    name: Submit to App Store
    runs-on: macos-14
    needs: [deploy-testflight]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          cd ios && pod install
          gem install fastlane

      - name: Submit to App Store
        run: fastlane release
        env:
          APPLE_ID:                          ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:                     ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID:                       ${{ secrets.ITC_TEAM_ID }}
          MATCH_GIT_URL:                     ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:                    ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
