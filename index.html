    <!-- Error display styles -->
    <style id="error-styles">
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #022c22 0%, #064e3b 50%, #022c22 100%);
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      /* Error overlay base styles */
      .react-error-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(220, 38, 38, 0.95);
        color: white;
        padding: 2rem;
        font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Segoe UI Mono', 'Roboto Mono', monospace;
        font-size: 14px;
        z-index: 99999;
        overflow: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .react-error-content {
        max-width: 800px;
        width: 100%;
        background: #1f2937;
        border-radius: 12px;
        padding: 24px;
        border: 2px solid #ef4444;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      .react-error-title {
        font-size: 24px;
        margin-bottom: 16px;
        color: #ef4444;
        font-weight: bold;
      }

      .react-error-message {
        background: #111827;
        padding: 16px;
        border-radius: 8px;
        overflow: auto;
        max-height: 400px;
        white-space: pre-wrap;
        word-break: break-all;
        color: #fca5a5;
      }

      .react-error-dismiss {
        margin-top: 16px;
        padding: 12px 24px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.2s;
      }

      .react-error-dismiss:hover {
        background: #2563eb;
      }

      /* Loading state */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: white;
      }

      .app-loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Dev mode banner */
      .dev-mode-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #f59e0b;
        color: black;
        text-align: center;
        padding: 8px;
        font-size: 12px;
        font-weight: bold;
        z-index: 99998;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading state while React loads -->
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
        <p style="margin-top: 16px; font-size: 18px;">Loading OrbitPay...</p>
      </div>
    </div>

    <!-- Development mode banner -->
    <script type="module">
      // Show dev mode banner
      if (import.meta.env.DEV) {
        const banner = document.createElement('div');
        banner.className = 'dev-mode-banner';
        banner.textContent = '🛠️ Development Mode - Errors will be displayed prominently';
        document.body.prepend(banner);
      }

      // Handle critical errors before React loads
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'react-error-overlay';
        errorDiv.innerHTML = `
          <div class="react-error-content">
            <h2 class="react-error-title">⚠️ Critical Error</h2>
            <p style="margin-bottom: 16px; color: #fbbf24;">
              A critical error occurred before React could initialize. This may indicate a build or configuration issue.
            </p>
            <div class="react-error-message">
Error: ${message}
Source: ${source}:${lineno}:${colno}
${error ? 'Stack: ' + error.stack : ''}
            </div>
            <button onclick="location.reload()" class="react-error-dismiss">
              Reload Page
            </button>
          </div>
        `;
        document.body.appendChild(errorDiv);
        return true; // Prevent default error handling
      };

      // Handle unhandled promise rejections
      window.onunhandledrejection = function(event) {
        console.error('Unhandled Promise Rejection:', event.reason);
      };
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
